custom:
  name: "自定义"
  description: "早上6点、中午12点、晚上7点各推送一次"

  default:
    collect: true
    analyze: false
    ai_mode: "current"
    push: false
    report_mode: "current"
    once:
      analyze: true
      push: true

  periods:
    morning:
      name: "早间推送"
      start: "08:00"
      end: "09:00"
      push: true
      report_mode: "daily"
    evening:
      name: "晚间推送"
      start: "16:00"
      end: "17:00"
      push: true
      report_mode: "daily"

  day_plans:
    all_day:
      periods: ["morning", "evening"]

  week_map:
    1: "all_day"
    2: "all_day"
    3: "all_day"
    4: "all_day"
    5: "all_day"
    6: "all_day"
    7: "all_day"

  overlap:
    policy: "error_on_overlap"

